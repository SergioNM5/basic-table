<div class="people-table-container">
  <h2>People Directory</h2>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Filter by keyword</mat-label>
    <input
      matInput
      [value]="filterText()"
      (input)="applyFilter($event)"
      placeholder="Search..."
    />
  </mat-form-field>

  @if (loading()) {
    <div class="loading">Loading...</div>
  } @else {
    <table mat-table [dataSource]="dataSource" matSort class="people-table">
      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
        <td mat-cell *matCellDef="let person">{{ person.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
        <td mat-cell *matCellDef="let person">{{ person.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="dateOfBirth">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date of Birth</th>
        <td mat-cell *matCellDef="let person">{{ person.dateOfBirth }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
        <td mat-cell *matCellDef="let person">{{ person.title }}</td>
      </ng-container>

      <ng-container matColumnDef="phoneNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone Number</th>
        <td mat-cell *matCellDef="let person">{{ person.phoneNumber }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
      ></tr>

      <tr class="no-results-row" *matNoDataRow>
        <td colspan="5" class="no-results">No results found.</td>
      </tr>
    </table>
  }
</div>
